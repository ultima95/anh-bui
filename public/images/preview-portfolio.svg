<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#FAFAF8"/>

  <!-- Dot grid texture -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#000" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Nav -->
  <rect width="800" height="52" fill="rgba(250,250,248,0.9)"/>
  <text x="40" y="33" fill="#111" font-size="13" font-weight="700" letter-spacing="-0.5">Anh Bui</text>
  <text x="536" y="33" fill="#aaa" font-size="11">About</text>
  <text x="591" y="33" fill="#aaa" font-size="11">Projects</text>
  <text x="655" y="33" fill="#aaa" font-size="11">Skills</text>
  <text x="706" y="33" fill="#aaa" font-size="11">Experience</text>

  <!-- Available badge -->
  <rect x="40" y="72" width="176" height="22" rx="11" fill="white" stroke="#e5e5e3" stroke-width="1"/>
  <circle cx="56" cy="83" r="3.5" fill="#22c55e"/>
  <text x="66" y="87" fill="#666" font-size="9.5">Available for opportunities</text>

  <!-- Role label -->
  <text x="40" y="128" fill="#aaa" font-size="9.5" letter-spacing="3">FRONTEND DEVELOPER</text>

  <!-- Name -->
  <text x="38" y="200" fill="#111" font-size="68" font-weight="900" letter-spacing="-3">Anh Bui</text>
  <!-- Amber underline -->
  <rect x="40" y="207" width="246" height="5" rx="2.5" fill="#F59E0B"/>

  <!-- Description -->
  <text x="40" y="236" fill="#888" font-size="13">Building accessible, performant web</text>
  <text x="40" y="254" fill="#888" font-size="13">interfaces with a sharp eye for design.</text>

  <!-- Buttons -->
  <rect x="40" y="274" width="136" height="38" rx="19" fill="#111"/>
  <text x="108" y="298" text-anchor="middle" fill="white" font-size="12" font-weight="600">View My Work →</text>
  <rect x="188" y="274" width="86" height="38" rx="19" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="231" y="298" text-anchor="middle" fill="#666" font-size="12">Resume</text>

  <!-- Right: project cards hint -->
  <rect x="470" y="80" width="300" height="340" rx="0" fill="none"/>

  <!-- Card 1 -->
  <rect x="480" y="90" width="290" height="145" rx="14" fill="white" stroke="#eee" stroke-width="1"/>
  <rect x="480" y="90" width="290" height="80" rx="14" fill="#F2F2EF"/>
  <rect x="480" y="140" width="290" height="30" fill="#F2F2EF"/>
  <text x="498" y="196" fill="#333" font-size="12" font-weight="600">Portfolio Site</text>
  <text x="498" y="212" fill="#aaa" font-size="10">Next.js · TypeScript · PostgreSQL</text>
  <rect x="498" y="202" width="40" height="6" rx="3" fill="#eee"/>

  <!-- Card 2 -->
  <rect x="480" y="250" width="138" height="130" rx="14" fill="white" stroke="#eee" stroke-width="1"/>
  <rect x="480" y="250" width="138" height="72" rx="14" fill="#EEF4FF"/>
  <rect x="480" y="302" width="138" height="20" fill="#EEF4FF"/>
  <text x="494" y="349" fill="#333" font-size="11" font-weight="600">Task Manager</text>
  <text x="494" y="363" fill="#aaa" font-size="9.5">React · Zustand</text>

  <!-- Card 3 -->
  <rect x="632" y="250" width="138" height="130" rx="14" fill="white" stroke="#eee" stroke-width="1"/>
  <rect x="632" y="250" width="138" height="72" rx="14" fill="#F0FFF4"/>
  <rect x="632" y="302" width="138" height="20" fill="#F0FFF4"/>
  <text x="646" y="349" fill="#333" font-size="11" font-weight="600">Weather App</text>
  <text x="646" y="363" fill="#aaa" font-size="9.5">React · Recharts</text>

  <!-- Scroll hint -->
  <line x1="420" y1="60" x2="420" y2="390" stroke="#e5e5e3" stroke-width="1"/>
</svg>
